<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Child selector</title>
    <style>
        ul > li{
                color: brown;
                background-color: aqua;
        }
    </style>
</head>
<body>
    <p>Targets elements that are direct childeren (one level down)</p>
    <h1>Heading 1</h1>
  
    <ul>
        <li>messi</li>
        <li>neyamr</li>
        <li>nico paz</li>
    </ul>
</body>
</html>
